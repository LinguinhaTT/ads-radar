services:
  postgres:
    image: postgres:16-alpine
    container_name: ads-radar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: adsradar
      POSTGRES_USER: adsradar
      POSTGRES_PASSWORD: adsradar123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
